<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
  font-family: Arial, sans-serif;
  text-align:center;
  padding:15px;
  margin:0;
}

h1{
  font-size:32px;
}

h2{
  font-size:24px;
}

button{
  padding:15px 25px;
  font-size:20px;
  margin:10px;
  cursor:pointer;
}

#reader{
  width:100%;
  max-width:500px;
  margin:auto;
}

#result{
  margin-top:20px;
  font-size:24px;
  font-weight:bold;
  white-space:pre-line;
  padding:10px;
}

.success{
  color:green;
}

.warning{
  color:orange;
}

.error{
  color:red;
}

</style>

</head>

<body>

<h1>BANFLEX ATTENDANCE</h1>

<h2 id="mode">Mode: IN</h2>

<button onclick="toggleMode()">
Switch IN / OUT
</button>

<div id="reader"></div>

<div id="result"></div>

<script>

let currentMode = "IN";
let scanLocked = false;

function toggleMode() {

  currentMode =
    currentMode === "IN"
    ? "OUT"
    : "IN";

  document.getElementById("mode").innerHTML =
    "Mode: " + currentMode;
}

function processScan(empId){

  if(scanLocked) return;

  scanLocked = true;

  document.getElementById("result").className = "";
  document.getElementById("result").innerHTML =
    "Processing...";

 const apiUrl =
"https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnSWRle_4O0gSNrtDT3otBrs2G8yEriIVHc-ySOmeVm0vPNIGeBbE-jehcfurppIYYLZNXEHnZBq-pKswi9z9At5eK39TGJcpSfYTJwHvqfn8VGB0jQ7irCVE2lo9od_VAlZmyLaSCqzEoV8gF-4zz-MUcvMuLhMUPUKdA0q2Rp0h1tN0KnGyjEpGGOWJ9djuZfvfH4IKszf47oQi0jIhmEE5opIOPbzXj4Z6psi_TISzwXUYZalx97yWJG_UlrQBeb4svgXXKnBaLoTudcirLjaLCoAG4ZfFGh9ZY9QzSFKSlQu7yE&lib=MS094tPILeBUi5zCsthUaxN5e-EaTGinT&id="
+ encodeURIComponent(empId)
+ "&action="
+ currentMode;

 fetch(apiUrl, {
  method: "GET",
  mode: "cors"
})
.then(response => response.text())
.then(data => {

  document.getElementById("result").innerHTML = data;

  setTimeout(function(){
    scanLocked = false;
  },2000);

})
.catch(error => {

  document.getElementById("result").innerHTML =
    "Error: " + error;

  scanLocked = false;

});
  .catch(error => {

      document.getElementById("result").className = "error";
      document.getElementById("result").innerHTML =
        "Error: " + error;

      scanLocked = false;

  });
}

const html5QrCode = new Html5Qrcode("reader");

html5QrCode.start(
  { facingMode: "environment" },
  {
    fps: 10,
    qrbox: 280
  },
  function(decodedText){

    processScan(decodedText.trim());

  },
  function(errorMessage){
    // Ignore scan errors
  }
).catch(function(err){

  document.getElementById("result").className = "error";
  document.getElementById("result").innerHTML =
    "Camera Error: " + err;

});

</script>

</body>
</html>
