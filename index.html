<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

h1{
  font-size:42px;
}

h2{
  font-size:32px;
}

button{
  padding:15px 25px;
  font-size:22px;
  margin:10px;
}

#reader{
  width:350px;
  margin:auto;
}

#result{
  margin-top:25px;
  font-size:24px;
  font-weight:bold;
  white-space:pre-line;
}
</style>
</head>

<body>

<h1>BANFLEX ATTENDANCE</h1>

<h2 id="mode">Mode: IN</h2>

<button onclick="toggleMode()">
Switch IN / OUT
</button>

<br><br>

<div id="reader"></div>

<div id="result"></div>

<script>

let currentMode = "IN";
let scanLocked = false;

function toggleMode() {

  currentMode =
    currentMode === "IN"
      ? "OUT"
      : "IN";

  document.getElementById("mode").innerHTML =
    "Mode: " + currentMode;
}

function processScan(empId) {

  if (scanLocked) return;

  scanLocked = true;

  document.getElementById("result").innerHTML =
    "Submitting " + empId + "...";

  const apiUrl =
    "https://script.google.com/macros/s/AKfycbwYv4roW8GVAx3RTsDAk4Xs41BLec0CtY2A72PcP_On4TKIU16Q2rIelMkECFCpyLyv/exec?id="
    + encodeURIComponent(empId)
    + "&action="
    + currentMode;

  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = apiUrl;
  document.body.appendChild(iframe);

  document.getElementById("result").innerHTML =
    "✓ Attendance Submitted\n\n" +
    empId + "\n\nMode: " + currentMode;

  setTimeout(function() {
    scanLocked = false;
  }, 3000);
}

function startScanner() {

  const html5QrCode =
    new Html5Qrcode("reader");

  html5QrCode.start(
    {
      facingMode: "environment"
    },
    {
      fps: 10,
      qrbox: 250
    },
    function(decodedText) {

      processScan(decodedText);

    },
    function(errorMessage) {

      // ignore scan errors

    }
  )
  .catch(function(err) {

    document.getElementById("result").innerHTML =
      "Camera Error: " + err;

  });
}

window.onload = startScanner;

</script>

</body>
</html>
