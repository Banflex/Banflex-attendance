<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  text-align:center;
  padding:20px;
}

#reader{
  width:350px;
  margin:auto;
}

button{
  padding:12px 20px;
  font-size:18px;
  margin:10px;
}

#result{
  margin-top:20px;
  font-size:20px;
  font-weight:bold;
  white-space:pre-line;
}
</style>
</head>

<body>

<h1>BANFLEX ATTENDANCE</h1>

<h2 id="mode">Mode: IN</h2>

<button onclick="toggleMode()">Switch IN / OUT</button>

<div id="reader"></div>

<div id="result"></div>

<script>

let currentMode = "IN";
let scanLocked = false;

function toggleMode(){
  currentMode = currentMode === "IN" ? "OUT" : "IN";
  document.getElementById("mode").innerHTML =
    "Mode: " + currentMode;
}

function processScan(empId){

  if(scanLocked) return;

  scanLocked = true;

  document.getElementById("result").innerHTML =
    "Processing...";

  const apiUrl =
    "https://script.google.com/macros/s/AKfycbwYv4roW8GVAx3RTsDAk4Xs41BLec0CtY2A72PcP_On4TKIU16Q2rIelMkECFCpyLyv/exec?id="
    + encodeURIComponent(empId)
    + "&action="
    + currentMode;

  fetch(apiUrl)
    .then(r => r.text())
    .then(data => {

      document.getElementById("result").innerHTML = data;

      setTimeout(function(){
        scanLocked = false;
      },2000);

    })
    .catch(err => {

      document.getElementById("result").innerHTML =
        "Error: " + err;

      scanLocked = false;

    });
}

function startScanner(){

  const scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    {
      fps: 10,
      qrbox: 250
    },
    function(decodedText){

      processScan(decodedText);

    },
    function(error){
      // ignore
    }
  ).catch(function(err){

    document.getElementById("result").innerHTML =
      "Camera Error: " + err;

  });

}

window.onload = startScanner;

</script>

</body>
</html>
